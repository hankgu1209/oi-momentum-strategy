services:
  scanner:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: oi-momentum:latest
    container_name: oi-momentum-scanner
    restart: unless-stopped
    command: ["python", "-m", "binance_oi_momentum.cli", "--config", "${CONFIG_PATH:-configs/strategy.local.yaml}"]
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      OI_MOMENTUM_CONFIG: ${CONFIG_PATH:-configs/strategy.local.yaml}
      # If your server needs a proxy to reach Binance, uncomment and edit:
      # HTTP_PROXY: http://host.docker.internal:7890
      # HTTPS_PROXY: http://host.docker.internal:7890
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data

  dashboard:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: oi-momentum:latest
    container_name: oi-momentum-dashboard
    restart: unless-stopped
    command:
      [
        "streamlit",
        "run",
        "src/binance_oi_momentum/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.headless=true",
        "--logger.level=info",
      ]
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: INFO
      OI_MOMENTUM_CONFIG: ${CONFIG_PATH:-configs/strategy.local.yaml}
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      # If your server needs a proxy to reach Binance, uncomment and edit:
      # HTTP_PROXY: http://host.docker.internal:7890
      # HTTPS_PROXY: http://host.docker.internal:7890
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
    depends_on:
      - scanner

  caddy:
    image: caddy:2-alpine
    container_name: oi-momentum-caddy
    restart: unless-stopped
    profiles: ["domain"]
    environment:
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-localhost}
      DASHBOARD_USER: ${DASHBOARD_USER:-admin}
      DASHBOARD_PASSWORD_HASH: ${DASHBOARD_PASSWORD_HASH:-not-configured}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard

volumes:
  caddy_data:
  caddy_config:
