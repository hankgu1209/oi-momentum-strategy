services:
  scanner:
    build: .
    image: oi-momentum:latest
    container_name: oi-momentum-scanner
    restart: unless-stopped
    command: ["oi-momentum-scan", "--config", "configs/strategy.example.yaml"]
    environment:
      TZ: Asia/Shanghai
      # If your server needs a proxy to reach Binance, uncomment and edit:
      # HTTP_PROXY: http://host.docker.internal:7890
      # HTTPS_PROXY: http://host.docker.internal:7890
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data

  dashboard:
    build: .
    image: oi-momentum:latest
    container_name: oi-momentum-dashboard
    restart: unless-stopped
    command:
      [
        "streamlit",
        "run",
        "src/binance_oi_momentum/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.headless=true",
      ]
    environment:
      TZ: Asia/Shanghai
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      # If your server needs a proxy to reach Binance, uncomment and edit:
      # HTTP_PROXY: http://host.docker.internal:7890
      # HTTPS_PROXY: http://host.docker.internal:7890
    ports:
      - "8501:8501"
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
    depends_on:
      - scanner
